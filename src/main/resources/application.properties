# 1. PostgreSQL 드라이버 설정
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. DB 연결 설정 (Koyeb 환경변수를 그대로 사용)
#URL 예시: jdbc:postgresql://<host>:5432/<db_name>?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 3. JPA / Hibernate 설정 (PostgreSQL 방언으로 교체)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# MariaDBDialect 대신 PostgreSQLDialect를 사용합니다.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. 서버 포트 (Koyeb 설정과 일치시키신 8000번)
server.port=8000

# 5. SSL 설정 (중요!)
# Koyeb은 자체적으로 SSL(HTTPS)을 제공하므로, 내부 앱 서버에서 직접 p12 파일을 관리할 필요가 없는 경우가 많습니다.
# 만약 배포 시 에러가 난다면 아래 SSL 관련 설정들을 주석 처리해보세요.
# server.ssl.enabled=false

# Koyeb 환경에서는 false로 해야 합니다 (Koyeb이 HTTPS를 대신 처리함)
server.ssl.enabled=false

ftp.server=${FILE_URL}
ftp.port=21
ftp.username=${FILE_USERNAME}
ftp.password=${FILE_PASSWORD}
ftp.directory=${FILE_DIRECTORY}
